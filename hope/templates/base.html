<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Python Learning Platform{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- SIDEBAR (only shows when logged in) -->
    {% if session.get('user_id') %}
    <div class="sidebar">
        <div class="logo">
            <h2>🐍 PyLearn</h2>
        </div>

        <nav>
            <a href="{{ url_for('dashboard') }}">📊 Dashboard</a>
            <a href="{{ url_for('dashboard') }}#lessons">📚 Lessons</a>
            <a href="{{ url_for('code_lab') }}">💻 Code Lab</a>
            <a href="{{ url_for('progress') }}">📈 Progress</a>
        </nav>

        <div class="sidebar-footer">
            <p>{{ session.get('user_id') }}</p>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </div>
    {% endif %}

    <!-- MAIN CONTENT (ALWAYS SHOWS) -->
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <!-- SCRIPTS -->
    <script src="{{ url_for('static', filename='js/animations.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

    {% block scripts %}{% endblock %}

</body>
</html>
