{% extends "base.html" %}

{% block title %}Register - PyLearn{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>🐍 PyLearn</h1>
        <h2>Бүртгэл үүсгэх</h2>
        
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label>Хэрэглэгчийн нэр</label>
                <input type="text" name="username" required>
            </div>
            
            <div class="form-group">
                <label>Нууц үг</label>
                <input type="password" name="password" required>
            </div>
            
            <div class="form-group">
                <label>Нууц үгийг баталгаажуулах</label>
                <input type="password" name="password_confirm" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">Бүртгүүлэх</button>
        </form>
        
        <p class="auth-link">Өөр бүртгэлтэй юу? <a href="{{ url_for('login') }}">Нэвтрэх</a></p>
    </div>
</div>
{% endblock %}
